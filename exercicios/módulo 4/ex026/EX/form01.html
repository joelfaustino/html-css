<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário 01</title>
</head>
<body>
    <h1>Exercício sobre FORMULÁRIO</h1>

    <form action="cadastro.php" autocomplete="off">
        <p>
            <label for="id-name">Nome:</label>
            <input 
                type="text" 
                name="name" 
                id="id-name"
                placeholder="Nome Completo"
                required
                >
        </p>
        

        <p>
            <label for="id-password">Senha:</label>
            <input 
                type="password" 
                name="password" 
                id="id-password"
                placeholder="Digite sua senha"
                required
                >
        </p>

        <p>
            <label for="id-email">Email:</label>
            <input 
                type="text" 
                name="email" 
                id="id-email"
                placeholder="nome@gmail.com"
                required
                >
        </p>

        <p>
            <input type="submit" value="Cadastrar">
        </p>

        

    </form>
</body>
</html>
