<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formzinho</title>
</head>
<body>
    <h1>Exemplo de Formulário</h1>

    <form method="post">
        <p>
            <label for="ilist">Estados</label>
            <select name="estado" id="ilist">~
                <option value="" selected>Escolha...</option>
                <optgroup label="Brasil">
                    <option value="RJ">Rio de Janeiro</option>
                    <option value="PM" >Perna Mbuco</option>
                </optgroup>
                <optgroup label="Angola">
                    <option value="SM">Samba</option>
                    <option value="C">Cassenda</option>
                </optgroup>
            </select>
        </p>

        <p>
            <label for="iproff">Profissão</label>
            <input type="text" name="prof" id="iproff" list="listprof" required>

            <datalist id="listprof">
                <option value="DEV">Desenvolvedor</option>
                <option value="IS">Instrumentista</option>
                <option value="ENG">Engenheiro</option>
            </datalist>
        </p>
        <label for="icomposicao">Mensagem</label> <br>
        <textarea name="composição" id="icomposicao" 
        required 
        placeholder="Escreva aqui..." 
        cols="30" 
        rows="10"></textarea>

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
