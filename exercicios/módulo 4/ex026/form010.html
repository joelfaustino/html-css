<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form zini</title>
</head>
<body>
    <h1>Exemplo de Formulário</h1>
    <form action="cadastro1.php" method="post">

        <p>
            <label for="iano">Em que ano você nasceu?</label> <br>
            <input type="number" name="ano" id="iano" min="1990" max="2026" oninput="calcIdade()">
        </p>

        <p>
            <label for="iidade">Idade atual é:</label>
            <output id="iidade">0</output>
        </p>

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>

    <script>
        function calcIdade () {
            let atual = new Date().getFullYear()
            iidade.innerHTML = Number(atual) - Number(iano.value)
        }
    </script>
</body>
</html>
