<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>

<body>
    <form action="cadastro.php" method="get">
        <h1>Exemplo de Formulário</h1>

        <p>
            <label for="iemail">Email</label>
            <input type="email" name="email" id="iemail" required>
        </p>

        <p>
            <label for="itelefone">WhatsApp</label>
            <input type="tel" name="tel" id="itelefone" placeholder="+244 935 111 000" autocomplete="tel" required>
        </p>

        <p>
            <input type="submit" value="Enviar">
        </p>


</body>

</html>
